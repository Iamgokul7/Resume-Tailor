<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – ResumeTailor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 150px);
      padding: 24px;
    }
    .login-card {
      max-width: 420px;
      width: 100%;
    }
    .login-form-group {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .login-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .login-input {
      width: 100%;
      background: #FFFFFF;
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .login-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.15);
    }
    .login-error {
      background-color: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(192, 108, 98, 0.3);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      font-weight: 500;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">ResumeTailor</span>
      </div>
      <p class="tagline">AI-powered. ATS-safe. Tailored in seconds.</p>
    </div>
  </header>

  <!-- MAIN LOGIN CARD -->
  <main class="login-wrapper">
    <div class="panel login-card">
      <h2 class="panel-title" style="margin-bottom: 8px; text-align: center;">Welcome Back</h2>
      <p class="panel-desc" style="text-align: center; margin-bottom: 28px;">
        Please enter the access password to use the application.
      </p>

      {% if error %}
      <div class="login-error" role="alert">
        {{ error }}
      </div>
      {% endif %}

      <form action="/login" method="POST">
        <div class="login-form-group">
          <label for="password" class="login-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="login-input" 
            placeholder="Enter password..." 
            required 
            autofocus 
          />
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 8px;">
          Access Application
        </button>
      </form>
    </div>
  </main>

</body>
</html>
